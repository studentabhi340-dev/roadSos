<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadSoS — Emergency Road Assistant</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="script.js" defer></script>
</head>
<body>
<header>
  <div class="logo">Road<span>SoS</span></div>
  <div class="status-pill">
    <div class="status-dot"></div>
    <span id="status-text">Locating…</span>
  </div>
</header>

<div class="dest-bar">
  <input type="text" id="dest-input" placeholder="🔍  Enter destination">
  <button class="btn-route" onclick="searchDestination()">Go</button>
</div>

<div id="map"></div>

<div class="bottom-panel">
  <div class="sos-wrap">
    <button class="sos-btn" onclick="triggerSOS()">🆘 &nbsp;SOS</button>
  </div>

  <div class="quick-actions">
    <button class="q-btn" id="qb-hospital" onclick="findNearby('hospital')">
      <span class="icon">🏥</span> Hospital
    </button>
    <button class="q-btn" id="qb-police" onclick="findNearby('police')">
      <span class="icon">🚔</span> Police
    </button>
    <button class="q-btn" id="qb-ambulance" onclick="findNearby('ambulance')">
      <span class="icon">🚑</span> Ambulance
    </button>
    <button class="q-btn" id="qb-repair" onclick="findNearby('repair')">
      <span class="icon">🔧</span> Repair
    </button>
    <button class="q-btn" id="qb-food" onclick="findNearby('food')">
      <span class="icon">🛒</span> Store
    </button>
  </div>

  <div class="contact-strip">
    <div class="contact-info">
      <div class="contact-avatar">👤</div>
      <div>
        <div class="contact-name" id="contact-name-display">Add Emergency Contact</div>
        <div class="contact-label" id="contact-number-display">Tap edit to set →</div>
      </div>
    </div>
    <button class="btn-edit-contact" onclick="openContactModal()">Edit</button>
  </div>
</div>

<!-- SOS MODAL -->
<div class="modal-overlay" id="sos-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon">🆘</div>
      <div>
        <div class="modal-title">Emergency Activated</div>
        <div class="modal-sub" id="sos-time"></div>
      </div>
    </div>

    <div class="modal-loc">📍 <span id="sos-location">Fetching location…</span></div>

    <div class="family-alert">
      <span style="font-size:1.1rem">📲</span>
      <span id="family-alert-text">Alerting emergency contact…</span>
    </div>

    <!-- Tabs -->
    <div class="modal-tabs">
      <button class="tab-btn active" onclick="switchSOSTab('emergency', this)">🚨 Emergency</button>
      <button class="tab-btn" onclick="switchSOSTab('hospital', this)">🏥 Hospital</button>
      <button class="tab-btn" onclick="switchSOSTab('police', this)">🚔 Police</button>
      <button class="tab-btn" onclick="switchSOSTab('repair', this)">🔧 Vehicle Repair</button>
      <button class="tab-btn" onclick="switchSOSTab('food', this)">🛒 Food Store</button>
    </div>

    <div class="nearby-list" id="nearby-list"></div>

    <button class="modal-close" onclick="closeSOS()">✕ &nbsp;Cancel / Close</button>
  </div>
</div>

<!-- CONTACT MODAL -->
<div class="modal-overlay" id="contact-modal">
  <div class="contact-modal">
    <h3>📞 Emergency Contact</h3>
    <div class="field-group">
      <div>
        <label>Contact Name</label>
        <input type="text" id="c-name" placeholder="e.g. Mom, Dad, Rahul">
      </div>
      <div>
        <label>Phone Number</label>
        <input type="tel" id="c-number" placeholder="+91 985245****">
      </div>
    </div>
    <button class="btn-save" onclick="saveContact()">Save Contact</button>
    <button class="modal-close" onclick="closeContactModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>



</body>
</html>
